<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Form</title>
</head>

<body>
    <h1>Form Pendaftaran Mahasiswa</h1>
    <img src="img/STIKOM PGRI Banyuwangi.png" alt="STIKOM PGRI Banyuwangi" width="200" height="auto" title="Evernight HSR"><br><br>
    <form>
        <fieldset>
            <legend>Data Pribadi</legend>
            <label for="nama">Nama Lengkap:</label><br>
            <input type="text" id="nama" name="nama" placeholder="Masukkan Nama Lengkap"><br><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="contoh@gmail.com"><br><br>
            <label for="nomor-hp">Nomor HP:</label><br>
            <input type="tel" id="nomor-hp" name="nomor-hp" placeholder="0812xxxxxxxx"><br><br>
            <label for="tanggal-lahir">Tanggal Lahir:</label><br>
            <input type="date" id="tanggal-lahir" name="tanggal-lahir"><br><br>
            <label for="jenis-kelamin">Jenis Kelamin:</label><br><br>
            <input type="radio" id="pria" name="jenis-kelamin" value="pria">
            <label for="pria">Pria</label>
            <input type="radio" id="wanita" name="jenis-kelamin" value="wanita">
            <label for="wanita">Wanita</label>
        </fieldset>
        <fieldset>
            <legend>Data Akademik</legend>
            <label for="program-studi">Program Studi:</label><br><br>
            <select id="program-studi" name="program-studi">
                <option value="pilih-jurusan">-- Pilih Jurusan --</option>
                <option value="s1-teknik-informatika">S1 Teknik Informatika</option>
                <option value="d3-manajemen-informatika">D3 Manajemen Informatika</option>
                <option value="s1-desain-komunikasi-visual">S1 Desain Komunikasi Visual</option>
            </select><br><br>
            <label for="asal-sekolah">Asal Sekolah:</label><br><br>
            <input type="checkbox">SMA</input>
            <input type="checkbox">SMK</input>
            <input type="checkbox">MA</input><br><br>
            <label for="unggah-foto">Unggah Foto:</label><br><br>
            <input type="file" id="unggah-foto" name="unggah-foto"><br><br>
            <label for="catatan-tambahan">Catatan Tambahan:</label><br>
            <textarea name="catatan" id="catatan" cols="50" rows="5"
                placeholder="Tuliskan Catatan Tambahan Disini..."></textarea><br>
        </fieldset>
        <button type="submit">Daftar Sekarang!</button>
        <button type="reset">Reset Form</button>
    </form>
</body>

</html>
