<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Kritik dan Saran</title>
</head>

<body>
    <header>
        <h1>Warung Makan Banyuwangi</h1>
        <nav>
            <ul>
                <li><a href="beranda.html">Beranda</a></li>
                <li><a href="galeri_foto.html">Galeri Foto</a></li>
                <li><a href="formulir.html">Formulir</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <header>
                <h2>Formulir Pemesanan</h2>
                <p>Silakan lengkapi data pesanan Anda di bawah ini.</p>
            </header>

            <article>
                <form action="#" onsubmit="alert('Formulir berhasil dikirim!')">
                    <fieldset>
                        <legend>Data Diri</legend>
                        <label for="nama">Nama Lengkap:</label><br><br>
                        <input type="text" id="nama" name="nama" placeholder="Masukkan Nama Lengkap" required><br><br>
                        <label for="email">Email:</label><br><br>
                        <input type="email" id="email" name="email" placeholder="contoh@gmail.com" required><br><br>
                        <label for="nomor-hp">Nomor HP:</label><br><br>
                        <input type="tel" id="nomor-hp" name="nomor-hp" placeholder="0812xxxxxxxx"><br><br>
                        <label for="jenis-kelamin">Jenis Kelamin:</label><br><br>
                        <input type="radio" id="pria" name="jenis-kelamin" value="pria">
                        <label for="pria">Pria</label>
                        <input type="radio" id="wanita" name="jenis-kelamin" value="wanita">
                        <label for="wanita">Wanita</label>
                    </fieldset>

                    <fieldset>
                        <legend>Menu</legend>
                        <label for="makanan">Pilih Makanan:</label><br><br>
                        <input type="checkbox" id="tempong" name="makanan" value="tempong">
                        <label for="tempong">Sego Tempong</label>
                        <input type="checkbox" id="rujak-soto" name="makanan" value="rujak-soto">
                        <label for="rujak-soto">Rujak Soto</label>
                        <input type="checkbox" id="rawon-pecel" name="makanan" value="rawon-pecel">
                        <label for="rawon-pecel">Rawon Pecel</label>
                        <input type="checkbox" id="sego-cawuk" name="makanan" value="sego-cawuk">
                        <label for="sego-cawuk">Sego Cawuk</label><br><br>
                        <label for="minuman">Pilih Minuman:</label><br><br>
                        <input type="checkbox" id="es-teh" name="minuman" value="es-teh">
                        <label for="es-teh">Es Teh</label>
                        <input type="checkbox" id="es-jeruk" name="minuman" value="es-jeruk">
                        <label for="es-jeruk">Es Jeruk</label>
                        <input type="checkbox" id="es-temulawak" name="minuman" value="es-temulawak">
                        <label for="es-temulawak">Es Temulawak</label>
                        <input type="checkbox" id="teh-hangat" name="minuman" value="teh-hangat">
                        <label for="teh-hangat">Teh Hangat</label>
                        <input type="checkbox" id="kopi-hangat" name="minuman" value="kopi-hangat">
                        <label for="kopi-hangat">Kopi Hangat</label><br><br>
                        <label for="jumlah-makanan">Masukkan jumlah makanan yang ingin dipesan:</label><br><br>
                        <input type="number" id="jumlah-makanan" name="jumlah-makanan" min="1" value="1"><br><br>
                        <label for="jumlah-minuman">Masukkan jumlah minuman yang ingin dipesan:</label><br><br>
                        <input type="number" id="jumlah-minuman" name="jumlah-minuman" min="1" value="1"><br><br>
                        <label for="unggah-foto">Unggah foto bukti pembayaran:</label><br><br>
                        <input type="file" id="unggah-foto" name="unggah-foto"><br><br>
                        <label for="catatan-tambahan">Catatan Tambahan:</label><br><br>
                        <textarea name="catatan" id="catatan" cols="50" rows="5"
                            placeholder="Tuliskan Catatan Tambahan Di Sini..."></textarea><br>
                    </fieldset><br>
                    <button type="submit">Kirim!</button>
                    <button type="reset" onclick="alert('Formulir telah direset!')">Reset Form</button>
                </form>
            </article>
        </section>
    </main>

    <footer>

</body>

</html>
